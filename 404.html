<!DOCTYPE HTML PUBLIC "-//IETF//DTD HTML 2.0//EN">
<html>

<head>
	<title>林間小鎮 ForestWork</title>
	<style>
		.video-container {
		  position: absolute;
		  top: 0;
		  bottom: 0;
		  width: 100%;
		  height: 100%; 
		  overflow: hidden;
		}
		.video-container video {
		  /* Make video to at least 100% wide and tall */
		  min-width: 100%; 
		  min-height: 100%; 
		
		  /* Setting width & height to auto prevents the browser from stretching or squishing the video */
		  width: auto;
		  height: auto;
		
		  /* Center the video */
		  position: absolute;
		  top: 50%;
		  left: 50%;
		  transform: translate(-50%,-50%);
		}

		img {
			z-index: 100;
			height: 500px;
			overflow: hidden;
		}

		div {
  			display: flex;
  			justify-content: center;
			height: 100%;
			align-items: center;
		}
	</style>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css" rel="stylesheet">
</head>

<body>
	<div class="video-container">
		<video id="videoBG" autoplay muted loop>
			<source src="assets/img/404/404.mp4" type="video/mp4">
			Your browser does not support the video tag.
		</video>
	  </div>

	<div id="centerLOGO">
		<img class="center" src="assets/img/404/404.svg" width="90%" height="80%" alt="" />
	</div>
</body>

</html>
