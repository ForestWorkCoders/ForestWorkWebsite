<!DOCTYPE "utf-8">
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://unpkg.com/purecss@1.0.1/build/pure-min.css" integrity="sha384-oAOxQR6DkCoMliIh8yFnu25d7Eq/PHS21PClpwjOTeU2jRSq11vu66rf90/cZr47" crossorigin="anonymous">
        <link rel="stylesheet" type="text/css" href="style.css">
        <link rel="shortcut icon" href="../webicons/favicon.ico">
        <script type="text/javascript" src="animation.js"></script>
        <title>注意!</title>
    </head>
    <body id="body">
    	<div id="container">
	        <!-- 中央 box -->
	        <div class="box pure-g">
	            <div id="fontconfig" class="topic pure-u-1">
	                請先閱讀下列事項：<br>
	                <hr style="opacity: 0.5;">
	            </div>
	            <div id="fontconfig" class="rules pure-u-1">
	            	<li>本團隊限制最低年齡為「15歲」。
	                <li>如報名Minecraft組，請自備「Java版」正版帳號。
	                <li>如有加入其他Minecraft團隊，請先在表單裡報備。
	            </div>
	            <div id="fontconfig" class="attation pure-u-1">
	            	<br>
	                違反上述規則，事後經查證屬實，一律踢出團隊！<br>
	                <br>
	            </div>
	            <div id="fontconfig" class="pure-u-1">
	                <input type="button" class="button-accept pure-button" id="bta" value="我已閱讀上述注意事項" onclick="clickon()">
	            </div>
	        </div>
		    <!-- 底部 footer -->
	        <div class="footerbox pure-g">
	            <div class="pure-u-1 picture">
	                <svg style="width:50px; height:32px;">
	                    <image xlink:href="logo.svg" src="logo.svg" width="50px"/>
	                </svg>
	            </div>
	            <div id="fontconfig" class="pure-u-1 footer">
	                林間小鎮 TeamForestWork 2020 | 
	                <a href="../" style="color: gray;">回首頁</a>
	            </div>           
	        </div> 
	    </div>
    </body>
</html>
