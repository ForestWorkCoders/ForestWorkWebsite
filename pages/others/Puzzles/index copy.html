  <script>
    $(document).ready(function () {

      // Your JSON data
      const jsonData = {
        "levels": [
          {
            "name": "javaflash",
            "category": "Web",
            "description": "Kongregate 是一个收集flash游戏的网站，但是他跟之前的大部分弱弱的网站而言，他这次加了很多加密的方法防止你直接下载档案。但是听说这个游戏里面有一个神秘的音乐档案，把那个音乐的标题和他的代号做成 PBCTF{代号_标题}，这就是你要的答案了。",
            "ctf": "3a67e5fcf3fc85463565cbd18243fd3df72e1f1ac56f62f545b1d6bf078194f0",
            "scores": [
              {
                "player1": 123
              },
              {
                "player3": 12
              }
            ]
          },
          {
            "name": "64號基地",
            "category": "Misc",
            "description": "這是一道很簡單的面試題。你只需要把以下的代碼轉成 “PBCTF{”開頭的就行了。",
            "ctf": "e93aa249b380eab277c905019b6ea255c794fdbcf63221d8055e39c39a21bc33",
            "scores": [
              {
                "player1": 123
              },
              {
                "player2": 12
              }
            ]
          }
        ]
      };

      // Initialize the DataTable
      const table = $('#puzzle_leaderboard').DataTable({
            columnDefs: [{ targets: "_all", className: "dt-nowrap dt-head-center" }],
            fixedColumns: true,
            paging: false,
            scrollCollapse: true,
            scrollX: true, // Enable horizontal scrolling
            scrollY: "300px", // Set the vertical scrolling height
        });

        // Populate the DataTable with player data
        for (const level of jsonData.levels) {
            const rowData = [
                level.name,
                level.category,
                level.description,
            ];

            console.log(rowData);

            // Iterate through the weeks and set scores or default to 0
            for (let i = 1; i <= 20; i++) {
                const playerScore = level.scores.find(score => score[`player${i}`]);
                const scoreValue = playerScore ? playerScore[`player${i}`] : 0;
                rowData.push(scoreValue);
            }

            // Add the row to the DataTable
            table.row.add(rowData);
        }

        // Draw the DataTable to apply changes
        table.draw();
    });
  </script>
